name: "Terraform infrastructure"
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  terraform:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up AWS Credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Format
        run: terraform fmt -check
        working-directory: terraform

      - name: Terraform Init
        run: terraform init
        working-directory: terraform

      - name: Terraform Validate
        run: terraform validate
        working-directory: terraform

      - name: Terraform Plan
        env:
          TF_VAR_region:               ${{ secrets.REGION }}
          TF_VAR_availability_zone:    ${{ secrets.AVAILABILITY_ZONE }}
          TF_VAR_vpc_cidr:              ${{ secrets.VPC_CIDR }}
          TF_VAR_public_subnet_cidr:    ${{ secrets.PUBLIC_SUBNET_CIDR }}
          TF_VAR_private_subnet_cidr:   ${{ secrets.PRIVATE_SUBNET_CIDR }}
          TF_VAR_instance_type:         ${{ secrets.INSTANCE_TYPE }}
          TF_VAR_key_name:               ${{ secrets.KEY_NAME }}
          TF_VAR_admin_cidr:              ${{ secrets.ADMIN_CIDR }}
          TF_VAR_s3_bucket_name:           ${{ secrets.S3_BUCKET_NAME }}
          TF_VAR_dynamodb_table_name:      ${{ secrets.DYNAMODB_TABLE_NAME }}
          TF_VAR_nomad_client_count:        ${{ secrets.NOMAD_CLIENT_COUNT }}
          TF_VAR_bastion_public_key:         ${{ secrets.BASTION_PUBLIC_KEY }}
        run: terraform plan -out=tfplan 
        
      - name: Terraform Apply
        env:
          TF_VAR_region:               ${{ secrets.REGION }}
          TF_VAR_availability_zone:    ${{ secrets.AVAILABILITY_ZONE }}
          TF_VAR_vpc_cidr:              ${{ secrets.VPC_CIDR }}
          TF_VAR_public_subnet_cidr:    ${{ secrets.PUBLIC_SUBNET_CIDR }}
          TF_VAR_private_subnet_cidr:   ${{ secrets.PRIVATE_SUBNET_CIDR }}
          TF_VAR_instance_type:         ${{ secrets.INSTANCE_TYPE }}
          TF_VAR_key_name:               ${{ secrets.KEY_NAME }}
          TF_VAR_admin_cidr:              ${{ secrets.ADMIN_CIDR }}
          TF_VAR_s3_bucket_name:           ${{ secrets.S3_BUCKET_NAME }}
          TF_VAR_dynamodb_table_name:      ${{ secrets.DYNAMODB_TABLE_NAME }}
          TF_VAR_nomad_client_count:        ${{ secrets.NOMAD_CLIENT_COUNT }}
          TF_VAR_bastion_public_key:         ${{ secrets.BASTION_PUBLIC_KEY }}
        run: terraform apply -input=false -auto-approve tfplan
